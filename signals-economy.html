<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Economy Signal — OpenEdux</title>
    <meta name="description" content="Tracking valuation percentiles across major sector ETFs — a living map of capital flows.">
    <link rel="icon" href="logo-capybara.png" type="image/png">
    <meta property="og:title" content="Economy Signal — OpenEdux">
    <meta property="og:description" content="Tracking valuation percentiles across major sector ETFs.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Source+Sans+3:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e13;
            --text: #c8d6e5;
            --text-dim: rgba(200,214,229,0.45);
            --accent: #7aa2d4;
            --border: rgba(138,164,199,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: "Source Sans 3", sans-serif;
            min-height: 100vh;
            padding: 2rem;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 30% 20%, rgba(20,40,70,0.4), transparent 70%),
                radial-gradient(ellipse 40% 40% at 70% 60%, rgba(20,50,60,0.25), transparent 60%);
            pointer-events: none;
        }

        main {
            max-width: 96vw;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .back-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s;
        }
        .back-link:hover { color: var(--accent); }

        .tagline {
            text-align: center;
            margin: 1rem 0 2rem;
            color: var(--text-dim);
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .title-section { text-align: center; margin-bottom: 1.5rem; }

        .eyebrow {
            font-family: "JetBrains Mono", monospace;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .title {
            font-family: "JetBrains Mono", monospace;
            font-weight: 300;
            font-size: 1.4rem;
            color: var(--text);
        }

        /* === Chart === */
        .chart-wrap {
            position: relative;
            width: 90%;
            max-width: 1200px;
            margin: 2rem auto;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            cursor: crosshair;
        }

        /* === Legend === */
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem 2rem;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            cursor: pointer;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-family: "JetBrains Mono", monospace;
        }

        .legend-item:hover { background: rgba(255,255,255,0.04); }

        .legend-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .legend-name { color: var(--text-dim); }
        .legend-value { color: var(--text); font-weight: 500; }

        .legend-item.active { background: rgba(255,255,255,0.06); }
        .legend-item.active .legend-name { color: var(--text); }

        footer {
            text-align: center;
            margin-top: 3rem;
            color: var(--text-dim);
            font-size: 0.75rem;
            letter-spacing: 0.08em;
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .legend { gap: 0.5rem 1rem; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<main>
    <a class="back-link" href="signals.html">← Signals</a>
    <div class="tagline">Economy Signal</div>

    <div class="title-section">
        <div class="eyebrow">Valuation Water Level</div>
        <h1 class="title">where capital flows</h1>
    </div>

    <div class="chart-wrap">
        <canvas id="chart"></canvas>
    </div>

    <div class="legend" id="legend"></div>

    <footer>OpenEdux — Economy Signal</footer>
</main>

<script>
// ===== ETF Configuration =====
const etfs = [
    { code: "513180", name: "恒生科技",   color: "#f97316", region: "HK" },
    { code: "512010", name: "医药",       color: "#22c55e", region: "CN" },
    { code: "512880", name: "证券",       color: "#ef4444", region: "CN" },
    { code: "159928", name: "消费",       color: "#f59e0b", region: "CN" },
    { code: "516160", name: "新能源",     color: "#06b6d4", region: "CN" },
    { code: "512480", name: "半导体",     color: "#8b5cf6", region: "CN" },
    { code: "510300", name: "沪深300",    color: "#a1a1aa", region: "CN" },
    { code: "QQQ",    name: "纳指100",    color: "#3b82f6", region: "US" },
    { code: "XLV",    name: "美股医药",   color: "#10b981", region: "US" },
    { code: "XLK",    name: "美股科技",   color: "#6366f1", region: "US" },
    { code: "518880", name: "黄金",       color: "#fbbf24", region: "CN" },
];

// ===== Data loading: JSON → seed fallback =====
let chartData = {};
let dates = [];

function buildSeedData() {
    // Generate smooth realistic seed curves as fallback
    const d = [];
    const today = new Date();
    for (let i = 29; i >= 0; i--) {
        const dt = new Date(today);
        dt.setDate(dt.getDate() - i);
        d.push(dt.toISOString().split('T')[0]);
    }

    const baseValues = {
        "513180": { start: 62, trend: -0.3, amp: 4 },
        "512010": { start: 23, trend: 0.2, amp: 3 },
        "512880": { start: 48, trend: -0.5, amp: 5 },
        "159928": { start: 18, trend: 0.1, amp: 2 },
        "516160": { start: 35, trend: -0.4, amp: 6 },
        "512480": { start: 72, trend: 0.6, amp: 5 },
        "510300": { start: 45, trend: -0.1, amp: 3 },
        "QQQ":    { start: 85, trend: 0.3, amp: 4 },
        "XLV":    { start: 55, trend: -0.2, amp: 3 },
        "XLK":    { start: 78, trend: 0.4, amp: 4 },
    };

    const sd = {};
    etfs.forEach(etf => {
        const b = baseValues[etf.code] || { start: 50, trend: 0, amp: 3 };
        const pts = [];
        d.forEach((dt, i) => {
            let v = b.start + b.trend * i + Math.sin(i * 0.3) * b.amp + Math.cos(i * 0.7) * b.amp * 0.5;
            v = Math.max(2, Math.min(98, Math.round(v * 10) / 10));
            pts.push([dt, v]);
        });
        sd[etf.code] = pts;
    });
    return { data: sd, dates: d };
}

async function loadData() {
    try {
        const resp = await fetch('etf_data.json');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const json = await resp.json();
        const allDates = new Set();
        const cd = {};

        etfs.forEach(etf => {
            const pts = json[etf.code];
            if (pts && Array.isArray(pts) && pts.length > 0) {
                cd[etf.code] = pts.map(p => {
                    allDates.add(p.date);
                    return [p.date, p.percentile];
                });
            }
        });

        if (Object.keys(cd).length > 0) {
            chartData = cd;
            dates = Array.from(allDates).sort();
            document.querySelector('.tagline').textContent =
                'Economy Signal · ' + Object.keys(cd).length + ' ETFs · ' + dates.length + ' days';
            return;
        }
    } catch(e) {
        document.querySelector('.tagline').textContent = 'Economy Signal · using seed data';
    }

    const seed = buildSeedData();
    chartData = seed.data;
    dates = seed.dates;
}

// ===== Canvas Chart =====
const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
const legendEl = document.getElementById('legend');
let activeCode = null;

function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = Math.min(650, window.innerHeight * 0.65) * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = Math.min(650, window.innerHeight * 0.65) + 'px';
    draw();
}

function draw() {
    const W = canvas.width / (window.devicePixelRatio || 1);
    const H = canvas.height / (window.devicePixelRatio || 1);
    const dpr = window.devicePixelRatio || 1;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    const pad = { top: 30, right: 30, bottom: 40, left: 55 };
    const pw = W - pad.left - pad.right;
    const ph = H - pad.top - pad.bottom;

    ctx.clearRect(0, 0, W, H);

    // No data fallback
    if (dates.length === 0) {
        ctx.fillStyle = 'rgba(200,214,229,0.3)';
        ctx.font = '14px \"Source Sans 3\", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('No data yet — run fetch_etf_data.py', W/2, H/2);
        return;
    }

    // Valuation zone backgrounds (极淡)
    const zones = [
        { y0: 0.80, color: 'rgba(34,197,94,0.04)' },   // 0-20 deep fear
        { y0: 0.60, color: 'rgba(34,197,94,0.02)' },   // 20-40 undervalued
        { y0: 0.40, color: 'rgba(148,163,184,0.02)' }, // 40-60 neutral
        { y0: 0.20, color: 'rgba(251,146,60,0.03)' },  // 60-80 crowded
    ];
    zones.forEach(z => {
        const y = pad.top + ph * z.y0;
        const h = ph * 0.20;
        ctx.fillStyle = z.color;
        ctx.fillRect(pad.left, y, pw, h);
    });
    // 80-100 euphoric
    ctx.fillStyle = 'rgba(239,68,68,0.04)';
    ctx.fillRect(pad.left, pad.top, pw, ph * 0.20);

    // Background grid
    ctx.strokeStyle = 'rgba(138,164,199,0.06)';
    ctx.lineWidth = 1;
    for (let p = 0; p <= 100; p += 25) {
        const y = pad.top + ph * (1 - p / 100);
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(W - pad.right, y);
        ctx.stroke();
    }

    // 50% reference line
    ctx.strokeStyle = 'rgba(138,164,199,0.15)';
    ctx.setLineDash([4, 6]);
    const y50 = pad.top + ph * 0.5;
    ctx.beginPath();
    ctx.moveTo(pad.left, y50);
    ctx.lineTo(W - pad.right, y50);
    ctx.stroke();
    ctx.setLineDash([]);

    // Y-axis labels
    ctx.fillStyle = 'rgba(200,214,229,0.35)';
    ctx.font = '10px "JetBrains Mono", monospace';
    ctx.textAlign = 'right';
    [0, 25, 50, 75, 100].forEach(p => {
        const y = pad.top + ph * (1 - p / 100);
        ctx.fillText(p + '%', pad.left - 8, y + 4);
    });

    // X-axis: show all dates, or centered single date
    ctx.fillStyle = 'rgba(200,214,229,0.25)';
    ctx.textAlign = 'center';
    const xStep = dates.length > 1 ? pw / (dates.length - 1) : pw;
    dates.forEach((d, i) => {
        const skip = dates.length > 10 ? i % 5 !== 0 : false;
        if (skip && i !== dates.length - 1) return;
        const x = dates.length === 1 ? pad.left + pw / 2 : pad.left + xStep * i;
        const label = d.slice(5);
        ctx.fillText(label, x, H - pad.bottom + 18);
    });

    // Collect ETFs with data for spreading single-date view
    const activeEtfs = etfs.filter(e => chartData[e.code] && chartData[e.code].length > 0);

    // Draw dots & lines
    etfs.forEach(etf => {
        const pts = chartData[etf.code];
        if (!pts || pts.length === 0) return;

        const isActive = activeCode === etf.code;
        const isDimmed = activeCode && activeCode !== etf.code;
        const alpha = isDimmed ? 0.1 : (activeCode ? 0.7 : 0.85);

        // For single-date: spread ETFs across x-axis
        const useSpreadX = (dates.length === 1 && activeEtfs.length > 1);
        const etfIndex = activeEtfs.indexOf(etf);
        const spreadStep = pw / (activeEtfs.length - 1);

        // Draw smooth curves (if 2+ points per ETF)
        if (pts.length >= 2) {
            ctx.beginPath();
            ctx.strokeStyle = isDimmed ? 'rgba(255,255,255,0.03)' : etf.color;
            ctx.lineWidth = isActive ? 2.5 : 1.2;
            ctx.globalAlpha = alpha;
            ctx.shadowColor = isActive ? etf.color : 'transparent';
            ctx.shadowBlur = isActive ? 12 : 0;

            const divisor = Math.max(pts.length - 1, 1);
            const step = pw / divisor;

            // Cardinal spline smoothing
            const tension = 0.3;
            const xs = pts.map((pt, i) => pad.left + step * i);
            const ys = pts.map(pt => pad.top + ph * (1 - pt[1] / 100));

            ctx.moveTo(xs[0], ys[0]);

            for (let i = 0; i < xs.length - 1; i++) {
                const x0 = i > 0 ? xs[i-1] : xs[0];
                const y0 = i > 0 ? ys[i-1] : ys[0];
                const x1 = xs[i];
                const y1 = ys[i];
                const x2 = xs[i+1];
                const y2 = ys[i+1];
                const x3 = i < xs.length - 2 ? xs[i+2] : xs[i+1];
                const y3 = i < ys.length - 2 ? ys[i+2] : ys[i+1];

                const cp1x = x1 + (x2 - x0) * tension;
                const cp1y = y1 + (y2 - y0) * tension;
                const cp2x = x2 - (x3 - x1) * tension;
                const cp2y = y2 - (y3 - y1) * tension;

                ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, x2, y2);
            }

            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // Draw dots
        ctx.globalAlpha = alpha;
        pts.forEach((pt, i) => {
            let x;
            if (useSpreadX) {
                x = pad.left + spreadStep * etfIndex;
            } else {
                const divisor = Math.max(pts.length - 1, 1);
                x = pad.left + (pw / divisor) * i;
            }
            const y = pad.top + ph * (1 - pt[1] / 100);
            ctx.beginPath();
            ctx.arc(x, y, isActive ? 3.5 : 2, 0, Math.PI * 2);
            ctx.fillStyle = etf.color;
            ctx.shadowColor = isActive ? etf.color : 'transparent';
            ctx.shadowBlur = isActive ? 10 : 0;
            ctx.fill();
        });
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
    });
}

// ===== Hover interaction =====
canvas.addEventListener('mousemove', function(e) {
    const W = canvas.width / (window.devicePixelRatio || 1);
    const H = canvas.height / (window.devicePixelRatio || 1);
    const pad = { top: 30, right: 30, bottom: 40, left: 45 };
    const pw = W - pad.left - pad.right;
    const ph = H - pad.top - pad.bottom;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W / rect.width);
    const my = (e.clientY - rect.top) * (H / rect.height);

    // Find closest data point
    let closest = null;
    let minDist = Infinity;
    const activeEtfs2 = etfs.filter(e => chartData[e.code] && chartData[e.code].length > 0);
    const useSpread = (dates.length === 1 && activeEtfs2.length > 1);
    const spreadStep2 = useSpread ? pw / (activeEtfs2.length - 1) : 0;

    etfs.forEach(etf => {
        const pts = chartData[etf.code];
        if (!pts || pts.length === 0) return;
        const etfIdx = activeEtfs2.indexOf(etf);
        pts.forEach((pt, i) => {
            let x;
            if (useSpread) {
                x = pad.left + spreadStep2 * etfIdx;
            } else {
                const divisor = Math.max(pts.length - 1, 1);
                x = pad.left + (pw / divisor) * i;
            }
            const y = pad.top + ph * (1 - pt[1] / 100);
            const dist = Math.sqrt((mx - x) ** 2 + (my - y) ** 2);
            if (dist < 40 && dist < minDist) {
                minDist = dist;
                closest = { etf, pt, i, x, y };
            }
        });
    });

    const prev = activeCode;
    activeCode = closest ? closest.etf.code : null;
    if (activeCode !== prev) {
        draw();
        updateLegend();
    }
});

canvas.addEventListener('mouseleave', function() {
    if (activeCode) {
        activeCode = null;
        draw();
        updateLegend();
    }
});

// ===== Legend =====
function updateLegend() {
    legendEl.innerHTML = etfs.map(etf => {
        const pts = chartData[etf.code];
        if (!pts || pts.length === 0) {
            return `
                <div class="legend-item" style="opacity:0.25" data-code="${etf.code}">
                    <div class="legend-dot" style="background:${etf.color};"></div>
                    <span class="legend-name">${etf.name}</span>
                    <span class="legend-value">—</span>
                </div>`;
        }
        const last = pts[pts.length - 1][1];
        const isActive = activeCode === etf.code;
        const isDimmed = activeCode && !isActive;
        const regionTag = etf.region === 'US' ? '🇺🇸' : etf.region === 'HK' ? '🇭🇰' : '🇨🇳';
        return `
            <div class="legend-item${isActive ? ' active' : ''}" style="opacity:${isDimmed ? 0.25 : 1}"
                 data-code="${etf.code}">
                <div class="legend-dot" style="background:${etf.color};box-shadow:0 0 6px ${etf.color}44"></div>
                <span class="legend-name">${regionTag} ${etf.name}</span>
                <span class="legend-value">${last}%</span>
            </div>`;
    }).join('');

    // Click to pin active
    legendEl.querySelectorAll('.legend-item').forEach(el => {
        el.addEventListener('click', function() {
            const code = this.dataset.code;
            activeCode = activeCode === code ? null : code;
            draw();
            updateLegend();
        });
    });
}

// ===== Init =====
(async function() {
    await loadData();
    updateLegend();
    window.addEventListener('resize', resize);
    resize();
})();
</script>
</body>
</html>
